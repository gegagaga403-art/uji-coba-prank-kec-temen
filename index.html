<!DOCTYPE html>
<html>
<head>
    <title>Website Halo</title>

    <style>
	body {
	    background-color: #f0f8ff; /* Mengubah warna latar belakanng jadi biru muda */
	    font-family: 'segoe UI', sans-serif; /* Mengubah model tulisan agar rapi */
	    text-align: center; */ membuat semua tulisan berada di tengah layar */
	    padding: 50px;
			
	}

	/* Gaya untuk kotak peringatan */
	.kotak-peringatan {
	   background-color: #fff3cd;
	   border: 2px dashed #ffc107;
	   color: #856404;
	   Padding: 15PX;
 	   border-radius: 8px;
	   max-width: 560px;
	   margin: 0 auto 20px auto;
	   text-align: left;
	}

	.kotak-peringatan p {
	    font-size: 15px;
	    margin: 5px 0;
	    color: #856404;
	}

	button {
	    background-color: #e74c3c; /* mengubah warna tombol jadi merah */
	    color: white; /* mengubah warna tulisan di dalam tombol jadi putih */
	    border: none; /* menghilangkan garis pinggir tombol yang kaku */
	    padding: 12px 24px; /* membuat tombol  jadi lebih gemuk/besar */
	    font-size: 16px;
	    border-raadius: 8px; /* membuat sudut tombol jadi melengkung (aesthetic) */
	    cursor: pointer; /* membuat kursor mouse berubah jadi jari tangan saat menunjuk tombol */
	    margin-bottom: 20px;
	}

	/* Efek interaktif: saat tombol ditunjuk mouse, warnanya berubah */
	button:hover {
	    background-color: #c0392b; /* merah yang agak tua */
	}

	#VideoPrank {
	    display: none;
	    margin-top: 20px;
	}
    </style>

</head>
<body>

	<h1>halo bung</h1>
	<p>gw baru belajar coding nih</p>

	<div class="kotak-peringatan">
	     <p><strong>⚠️ PERINGATAN SISTEM:</strong> Audio rekaman ini sangat kecil.</p>
	     <p><strong>💡TIPS:<strong> Harap gunakan <strong>Earphone</strong> dan naikkan <strong>Volume hingga 100%</strong>.</p>
	</div>

	<button onclick="pencetTombol()">sini</button>

	<br>

	<audio id="LaguPrank">
		  <source src="prank_op.mp3" type="audio/mpeg">
	</audio>
	
	<h1 id="teksKetawa" style="display:none; color: red; font-size: 40px; margin-top: 20px;">wkkwkkkwkwkkkwkkwkwk😹</h1>

    <script>
        function pencetTombol() {
            var audio = document.getElementById("Prank_op.mp3");
            
            // Trik 1: Paksa muat ulang audio dari awal agar browser HP mendeteksi file
            audio.load(); 
            
            // Trik 2: Atur volume ke paling maksimal (1.0 adalah 100%)
            audio.volume = 1.0; 
            
            // Trik 3: Putar audio dengan penanganan perintah paksa (Promise)
            audio.play().then(function() {
                // Jika sukses berputar, tampilkan teks ketawa
                document.getElementById("teksKetawa").style.display = "block";
            }).catch(function(error) {
                // Jika diblokir browser HP, jalankan paksa sekali lagi saat layar disentuh
                console.log("Browser memblokir autoplay, mencoba memutar ulang...");
                audio.play();
                document.getElementById("teksKetawa").style.display = "block";
            });
        }
    </script>
			 
</body>
</html>
